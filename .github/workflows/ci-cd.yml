# ═══════════════════════════════════════════════════════════════════
#   Kinetic TMS — CI/CD Pipeline (GitHub Actions)
#
#   • Frontend deploys on every push to main
#   • Backend deploys ONLY when backend/** files change
#   • Backend smoke test runs BEFORE traffic is switched
#
#   Required GitHub Secrets:
#     GCP_SA_KEY        — Service account JSON key
#     GCP_PROJECT_ID    — tms-service-491512
#     API_URL           — https://kinetic-api-1065403267999.us-central1.run.app
#     CORS_ORIGINS      — ["https://kinetic-frontend-1065403267999.us-central1.run.app"]
#     JWT_SECRET_KEY    — production JWT secret
#     DATABASE_URL      — production postgres connection string
#     GCS_BUCKET_NAME   — tms_bucket123
# ═══════════════════════════════════════════════════════════════════

name: Kinetic TMS — Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGION: us-central1
  FRONTEND_SERVICE: kinetic-frontend
  BACKEND_SERVICE:  kinetic-api

jobs:
  # ────────────────────────────────────────────────────────────────
  # Detect what changed
  # ────────────────────────────────────────────────────────────────
  changes:
    name: Detect changed paths
    runs-on: ubuntu-latest
    outputs:
      backend:  ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
            frontend:
              - 'frontend/**'

  # ────────────────────────────────────────────────────────────────
  # 1. Frontend Build Check
  # ────────────────────────────────────────────────────────────────
  frontend-build:
    name: Frontend — Build Check
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.frontend == 'true' || github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci --legacy-peer-deps

      - name: Lint (zero errors allowed)
        working-directory: ./frontend
        run: npm run lint:ci

      - name: Type-check & build
        working-directory: ./frontend
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.API_URL }}
        run: npm run build

  # ────────────────────────────────────────────────────────────────
  # 2. Backend Tests
  # ────────────────────────────────────────────────────────────────
  backend-test:
    name: Backend — Tests
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.backend == 'true' || github.event_name == 'pull_request'
    # No postgres service — tests use in-memory SQLite (aiosqlite).
    # asyncpg + per-test event loops causes "Future attached to a different loop"
    # errors when a real Postgres service is used with pytest-asyncio function scope.

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        working-directory: ./backend
        run: pip install -r requirements.txt

      - name: Run tests
        working-directory: ./backend
        env:
          JWT_SECRET_KEY: test-secret-key-for-ci
          ENVIRONMENT: testing
        run: |
          if [ -d "tests" ] && find tests -name "*.py" | grep -q .; then
            pytest tests/ -v --tb=short
          else
            echo "No tests found — skipping."
          fi

  # ────────────────────────────────────────────────────────────────
  # 3. Deploy Frontend (main branch only, when frontend changed)
  # ────────────────────────────────────────────────────────────────
  deploy-frontend:
    name: Deploy Frontend
    needs: [changes, frontend-build]
    runs-on: ubuntu-latest
    if: |
      github.ref == 'refs/heads/main' &&
      github.event_name == 'push' &&
      needs.changes.outputs.frontend == 'true'

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for GCR
        run: gcloud auth configure-docker gcr.io --quiet

      - name: Build frontend image
        run: |
          docker build \
            --build-arg NEXT_PUBLIC_API_URL=${{ secrets.API_URL }} \
            -t gcr.io/${{ secrets.GCP_PROJECT_ID }}/${{ env.FRONTEND_SERVICE }}:${{ github.sha }} \
            -t gcr.io/${{ secrets.GCP_PROJECT_ID }}/${{ env.FRONTEND_SERVICE }}:latest \
            ./frontend

      - name: Push frontend image
        run: |
          docker push gcr.io/${{ secrets.GCP_PROJECT_ID }}/${{ env.FRONTEND_SERVICE }}:${{ github.sha }}
          docker push gcr.io/${{ secrets.GCP_PROJECT_ID }}/${{ env.FRONTEND_SERVICE }}:latest

      - name: Deploy frontend to Cloud Run
        run: |
          gcloud run deploy ${{ env.FRONTEND_SERVICE }} \
            --image gcr.io/${{ secrets.GCP_PROJECT_ID }}/${{ env.FRONTEND_SERVICE }}:${{ github.sha }} \
            --platform managed \
            --region ${{ env.REGION }} \
            --project ${{ secrets.GCP_PROJECT_ID }} \
            --allow-unauthenticated \
            --set-env-vars "NEXT_PUBLIC_API_URL=${{ secrets.API_URL }}" \
            --quiet

      - name: Done
        run: echo "✅ Frontend live at https://kinetic-frontend-1065403267999.us-central1.run.app"

  # ────────────────────────────────────────────────────────────────
  # 4. Deploy Backend (main branch only, when backend changed)
  #    Uses --no-traffic so the new revision gets ZERO traffic
  #    until the smoke test passes, then switches 100%.
  # ────────────────────────────────────────────────────────────────
  deploy-backend:
    name: Deploy Backend
    needs: [changes, backend-test]
    runs-on: ubuntu-latest
    if: |
      github.ref == 'refs/heads/main' &&
      github.event_name == 'push' &&
      needs.changes.outputs.backend == 'true'

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for GCR
        run: gcloud auth configure-docker gcr.io --quiet

      - name: Build backend image
        run: |
          docker build \
            -t gcr.io/${{ secrets.GCP_PROJECT_ID }}/${{ env.BACKEND_SERVICE }}:${{ github.sha }} \
            -t gcr.io/${{ secrets.GCP_PROJECT_ID }}/${{ env.BACKEND_SERVICE }}:latest \
            ./backend

      - name: Push backend image
        run: |
          docker push gcr.io/${{ secrets.GCP_PROJECT_ID }}/${{ env.BACKEND_SERVICE }}:${{ github.sha }}
          docker push gcr.io/${{ secrets.GCP_PROJECT_ID }}/${{ env.BACKEND_SERVICE }}:latest

      - name: Validate deploy env format
        env:
          CORS_ORIGINS: ${{ secrets.CORS_ORIGINS }}
        run: |
          python - <<'PY'
          import json
          import os
          import sys

          value = (os.getenv("CORS_ORIGINS") or "").strip()
          if not value:
              print("CORS_ORIGINS is empty")
              sys.exit(1)

          try:
              if value.startswith("["):
                  parsed = json.loads(value)
                  if not isinstance(parsed, list) or not parsed:
                      raise ValueError("JSON value must be a non-empty array")
              elif "," in value:
                  parsed = [p.strip() for p in value.split(",") if p.strip()]
                  if not parsed:
                      raise ValueError("Comma-separated value has no valid URLs")
              else:
                  parsed = [value]
              print(f"CORS_ORIGINS validated ({len(parsed)} value(s))")
          except Exception as exc:
              print(f"Invalid CORS_ORIGINS: {exc}")
              sys.exit(1)
          PY

      # ── Run DB migrations via ephemeral Cloud Run Job ──
      # This runs BEFORE the deploy so the schema is ready when the new revision starts.
      # Uses psycopg2 (sync driver) which supports Cloud SQL Unix sockets.
      - name: Run DB migrations (Cloud Run Job)
        run: |
          JOB="migrate-$(echo ${{ github.sha }} | cut -c1-8)"
          echo "Creating migration job: $JOB"
          gcloud run jobs create "$JOB" \
            --image gcr.io/${{ secrets.GCP_PROJECT_ID }}/${{ env.BACKEND_SERVICE }}:${{ github.sha }} \
            --region ${{ env.REGION }} \
            --project ${{ secrets.GCP_PROJECT_ID }} \
            --set-cloudsql-instances tms-service-491512:us-central1:safehaultms \
            --set-secrets "DATABASE_URL=DATABASE_URL:latest,JWT_SECRET_KEY=JWT_SECRET_KEY:latest" \
            --set-env-vars "ENVIRONMENT=production,CORS_ORIGINS=${{ secrets.CORS_ORIGINS }}" \
            --command python \
            --args="-m" --args="alembic" --args="upgrade" --args="head" \
            --max-retries 0 \
            --task-timeout 120s \
            --execute-now \
            --wait
          echo "Migration complete. Cleaning up job."
          gcloud run jobs delete "$JOB" \
            --region ${{ env.REGION }} \
            --project ${{ secrets.GCP_PROJECT_ID }} \
            --quiet

      # Deploy with NO traffic — smoke test passes first, then switches 100%.
      # Migrations have already run via the Cloud Run Job above.
      # The container CMD still includes alembic upgrade as a safety net for manual deploys.
      # CRITICAL: --set-cloudsql-instances mounts the Cloud SQL Unix socket.
      - name: Deploy backend (no traffic)
        run: |
          gcloud run deploy ${{ env.BACKEND_SERVICE }} \
            --image gcr.io/${{ secrets.GCP_PROJECT_ID }}/${{ env.BACKEND_SERVICE }}:${{ github.sha }} \
            --platform managed \
            --region ${{ env.REGION }} \
            --project ${{ secrets.GCP_PROJECT_ID }} \
            --allow-unauthenticated \
            --no-traffic \
            --set-cloudsql-instances tms-service-491512:us-central1:safehaultms \
            --set-secrets "DATABASE_URL=DATABASE_URL:latest,JWT_SECRET_KEY=JWT_SECRET_KEY:latest" \
            --set-env-vars "ENVIRONMENT=production,CORS_ORIGINS=${{ secrets.CORS_ORIGINS }}" \
            --quiet

      # Smoke test against the new revision's URL (gets a unique URL even with no traffic)
      - name: Smoke test new revision
        run: |
          REVISION_URL=$(gcloud run revisions list \
            --service ${{ env.BACKEND_SERVICE }} \
            --region ${{ env.REGION }} \
            --project ${{ secrets.GCP_PROJECT_ID }} \
            --format="value(status.url)" \
            --limit=1 2>/dev/null || echo "")

          # Fallback: test main service URL
          TEST_URL="${REVISION_URL:-https://kinetic-api-1065403267999.us-central1.run.app}"

          echo "Testing: $TEST_URL/api/v1/health"
          for i in 1 2 3; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$TEST_URL/api/v1/health" --max-time 15 || echo "000")
            echo "  Attempt $i: HTTP $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "Backend is responding. Switching traffic."
              break
            fi
            if [ $i -eq 3 ]; then
              echo "❌ Backend smoke test failed after 3 attempts (HTTP $STATUS). Rolling back."
              exit 1
            fi
            sleep 10
          done

      # Only if smoke test passes — switch 100% traffic to new revision
      - name: Switch traffic to new revision
        run: |
          NEW_REV=$(gcloud run revisions list \
            --service ${{ env.BACKEND_SERVICE }} \
            --region ${{ env.REGION }} \
            --project ${{ secrets.GCP_PROJECT_ID }} \
            --format="value(metadata.name)" \
            --limit=1)
          echo "Switching 100% traffic to: $NEW_REV"
          gcloud run services update-traffic ${{ env.BACKEND_SERVICE }} \
            --to-revisions "$NEW_REV=100" \
            --region ${{ env.REGION }} \
            --project ${{ secrets.GCP_PROJECT_ID }} \
            --quiet

      - name: Done
        run: echo "✅ Backend live at https://kinetic-api-1065403267999.us-central1.run.app"
