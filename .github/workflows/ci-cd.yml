# ═══════════════════════════════════════════════════════════════════
#   Kinetic TMS — CI/CD Pipeline (GitHub Actions)
#   Triggers on every push to `main`.
#   Builds & deploys frontend + backend to Google Cloud Run.
# ═══════════════════════════════════════════════════════════════════

name: Kinetic TMS — Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── 1. Frontend Build Check ─────────────────────────────────────
  frontend-build:
    name: Frontend — Build Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci --legacy-peer-deps

      - name: Build (type-check + compile)
        working-directory: ./frontend
        env:
          NEXT_PUBLIC_API_URL: https://kinetic-api-1065403267999.us-central1.run.app
        run: npm run build

  # ── 2. Backend Test ─────────────────────────────────────────────
  backend-test:
    name: Backend — Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: kinetic
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: kinetic_tms_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        working-directory: ./backend
        run: pip install -r requirements.txt

      - name: Run tests
        working-directory: ./backend
        env:
          DATABASE_URL: postgresql+asyncpg://kinetic:test_password@localhost:5432/kinetic_tms_test
          JWT_SECRET_KEY: test-secret-key-for-ci
          ENVIRONMENT: testing
        run: |
          pytest tests/ -v --tb=short || echo "No tests found — skipping"

  # ── 3. Deploy (main branch only) ────────────────────────────────
  deploy:
    name: Deploy to Cloud Run
    needs: [frontend-build, backend-test]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      # ── Backend ─────────────────────────────────────────────────
      - name: Build & push backend image
        run: |
          gcloud builds submit ./backend \
            --tag gcr.io/${{ secrets.GCP_PROJECT_ID }}/kinetic-api:${{ github.sha }} \
            --project ${{ secrets.GCP_PROJECT_ID }}

      - name: Deploy backend to Cloud Run
        run: |
          gcloud run deploy kinetic-api \
            --image gcr.io/${{ secrets.GCP_PROJECT_ID }}/kinetic-api:${{ github.sha }} \
            --platform managed \
            --region us-central1 \
            --allow-unauthenticated \
            --project ${{ secrets.GCP_PROJECT_ID }} \
            --set-env-vars "ENVIRONMENT=production" \
            --set-env-vars "CORS_ORIGINS=${{ secrets.CORS_ORIGINS }}" \
            --set-secrets "JWT_SECRET_KEY=jwt-secret-key:latest,DATABASE_URL=database-url:latest"

      # ── Frontend ─────────────────────────────────────────────────
      - name: Build & push frontend image
        run: |
          gcloud builds submit ./frontend \
            --tag gcr.io/${{ secrets.GCP_PROJECT_ID }}/kinetic-frontend:${{ github.sha }} \
            --project ${{ secrets.GCP_PROJECT_ID }}

      - name: Deploy frontend to Cloud Run
        run: |
          gcloud run deploy kinetic-frontend \
            --image gcr.io/${{ secrets.GCP_PROJECT_ID }}/kinetic-frontend:${{ github.sha }} \
            --platform managed \
            --region us-central1 \
            --allow-unauthenticated \
            --project ${{ secrets.GCP_PROJECT_ID }} \
            --set-env-vars "NEXT_PUBLIC_API_URL=${{ secrets.API_URL }}"

      - name: Print live URLs
        run: |
          echo "✅ Frontend: https://kinetic-frontend-1065403267999.us-central1.run.app"
          echo "✅ Backend:  https://kinetic-api-1065403267999.us-central1.run.app"
