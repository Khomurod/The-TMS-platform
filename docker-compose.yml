# ═══════════════════════════════════════════════════════════════════
#   Safehaul TMS — Docker Compose (Local Development)
# ═══════════════════════════════════════════════════════════════════

services:
  # ── PostgreSQL Database ──────────────────────────────────────────
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: Safehaul
      POSTGRES_PASSWORD: Safehaul_dev_2024
      POSTGRES_DB: Safehaul_tms
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U Safehaul"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Backend API ──────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://Safehaul:Safehaul_dev_2024@db:5432/Safehaul_tms
      JWT_SECRET_KEY: dev-secret-key-change-in-production
      ENVIRONMENT: development
      CORS_ORIGINS: '["http://localhost:3000"]'
      GCS_BUCKET_NAME: ${GCS_BUCKET_NAME:-}
      GCS_CREDENTIALS_JSON: ${GCS_CREDENTIALS_JSON:-}
      GCP_PROJECT_ID: ${GCP_PROJECT_ID:-}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # ── Frontend (Next.js) ──────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    depends_on:
      - backend

volumes:
  pgdata:
